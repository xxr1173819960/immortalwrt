name: Build 0323 0052

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout VIKINGYFY 源码
        uses: actions/checkout@v4
        with:
          repository: VIKINGYFY/immortalwrt
          ref: main
          fetch-depth: 1

      # === 新增：复制自定义 files/（关键！让 uci-defaults 生效）===
      - name: 复制自定义 files 并设置权限
        run: |
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-custom-defaults << 'EOF'
          #!/bin/sh

          # 1. 修改主机名
          uci set system.@system[0].hostname='iPhone'

          # 2. 修改 LAN IP (不要在这里重启网络)
          uci set network.lan.ipaddr='192.168.124.1'
          uci set network.lan.netmask='255.255.255.0'

          # 3. IPv6 设置
          # uci set network.lan.ip6assign='60'
          # uci set network.lan.delegate='0'
          # uci set dhcp.lan.ra='server'
          # uci set dhcp.lan.dhcpv6='server'
          # uci set dhcp.lan.ndp='server'

          # 4. 设置 Root 密码 (这种方式最稳)
          # 待测试！
          # echo -e "12341234\n12341234" | passwd root

          # 有效
          printf "12341234\n12341234\n" | passwd root

          # 有效
          # if grep -qE '^root:([!:]|$)' /etc/shadow; then
              # (echo "12341234"; sleep 1; echo "12341234") | passwd root
              # echo "=== Root password set to 12341234 ==="
          # fi

          # 5. ZRAM 算法
          uci set system.@system[0].zram_comp_algo='zstd'
          uci set system.@system[0].zram_size_mb='192'

          # 6. 保存所有 UCI 修改
          uci commit

          # 7. 处理无线配置 (针对亚瑟的特殊处理)
          # 如果文件不存在，先强制触发检测生成默认配置
          [ ! -f /etc/config/wireless ] && wifi detect > /etc/config/wireless

          # uci set wireless.radio0.disabled='0'
          # uci set wireless.radio0.country='CN'
          # uci set wireless.radio1.disabled='0'
          # uci set wireless.radio1.country='CN'
          uci set wireless.default_radio0.ssid='CMCC-6fvQ-5G'
          uci set wireless.default_radio0.encryption='psk2+auto'
          uci set wireless.default_radio0.key='12341234'
          uci set wireless.default_radio1.ssid='CMCC-6fvQ'
          uci set wireless.default_radio1.encryption='psk2+auto'
          uci set wireless.default_radio1.key='12341234'
          uci commit wireless

          # 8. 将默认 Shell 切换为 Bash
          # 检查 bash 是否存在
          # if [ -f /bin/bash ]; then
          #     # 然后强制修改 /bin/sh 的指向
          #     # ln -sf /bin/bash /bin/sh
          #     # 同时修改 root 用户的默认 shell 环境（修改 /etc/passwd）
          #     sed -i 's/\/bin\/ash/\/bin\/bash/g' /etc/passwd
          # fi

          # 9. 切换拥塞控制算法
          echo "net.core.default_qdisc=fq" >> /etc/sysctl.d/10-default.conf
          echo "net.ipv4.tcp_congestion_control=bbr" >> /etc/sysctl.d/10-default.conf
          sysctl -p /etc/sysctl.d/10-default.conf

          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-custom-defaults

      - name: 安装编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch python3 python2.7 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler ccache ecj fastjar mkisofs wget curl swig rsync file python3-distutils python3-setuptools

      - name: 更新 feeds 并生成默认配置
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入极简配置
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq60xx=y
          CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-ss-01=y
          # CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-cs-02=y # 编译雅典娜固件


          CONFIG_KERNEL_ZRAM=y
          CONFIG_KERNEL_ZSMALLOC=y
          CONFIG_KERNEL_CRYPTO_LZ4=y
          CONFIG_KERNEL_CRYPTO_ZSTD=y

          # === zram zstd 关键修复（kernel 6.12+ 必须）===
          CONFIG_KERNEL_ZRAM_BACKEND_LZ4=y
          CONFIG_KERNEL_ZRAM_BACKEND_LZO=y
          CONFIG_KERNEL_ZRAM_BACKEND_LZO_REL=y
          CONFIG_KERNEL_ZRAM_BACKEND_ZSTD=y
          CONFIG_KERNEL_ZRAM_DEF_COMP_ZSTD=y


          # CONFIG_PACKAGE_ath11k-firmware-ipq6018=y
          # CONFIG_PACKAGE_ath11k-firmware-qcn9074=y  # 雅典娜专用


          # zram 算法模块（关键修复！）
          CONFIG_PACKAGE_kmod-lib-lz4=y
          CONFIG_PACKAGE_kmod-lib-zstd=y
          CONFIG_PACKAGE_kmod-crypto-zstd=y
          CONFIG_PACKAGE_kmod-crypto-lz4=y

          CONFIG_PACKAGE_kmod-ath11k=y
          CONFIG_PACKAGE_kmod-ath11k-qca9889=y # 存疑，实际未包含
          CONFIG_PACKAGE_kmod-ipt-offload=y

          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-pppoe=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-bridge-mgr=y

          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y  # 推荐，读写外挂硬盘快
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-uas=y # 提升 USB 3.0 硬盘性能
          CONFIG_PACKAGE_kmod-tcp-bbr=y # 提升传输性能

          CONFIG_PACKAGE_kmod-zram=y


          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl-openssl=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_luci-theme-argon=n
          # CONFIG_PACKAGE_luci-app-*=n  # 通配关闭大部分 luci-app（zerotier 例外已上面选


          CONFIG_PACKAGE_zram-swap=y
          CONFIG_PACKAGE_zerotier=y
          # CONFIG_PACKAGE_coremark=y # 评分
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_lsblk=y # 磁盘管理命令（lsblk）

          CONFIG_PACKAGE_htop=y  # htop工具
          # CONFIG_HTOP_LINUX=y

          CONFIG_PACKAGE_usbutils=y  # lsusb（USB 设备列表）
          CONFIG_PACKAGE_coreutils-nohup=y # coreutils-nohup
          CONFIG_PACKAGE_coreutils-date=y # 建议：确保 date 命令功能完整
          CONFIG_PACKAGE_coreutils-base64=y    # (可选) 很多插件依赖

          CONFIG_PACKAGE_bash=y  # bash
          CONFIG_PACKAGE_procps-ng-ps=y  # 必须：提供 ps -p 支持
          CONFIG_PACKAGE_procps-ng-pidof=y
          CONFIG_PACKAGE_grep=y                # 提供完整 grep 支持
          CONFIG_PACKAGE_gawk=y                # 提供完整 awk 支持
          CONFIG_PACKAGE_sed=y                 # 提供完整 sed 支持

          # ssh
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_openssh-server=n
          CONFIG_PACKAGE_openssh-sftp-server=y

          # === 新增：磁盘分区 + 格式化支持（极简稳定版） ===
          CONFIG_PACKAGE_block-mount=y        # 提供自动挂载支持
          CONFIG_PACKAGE_fdisk=y              # fdisk / sfdisk
          CONFIG_PACKAGE_cfdisk=y             # 可选，更友好的分区界面
          CONFIG_PACKAGE_parted=y             # parted（推荐，功能更全）
          CONFIG_PACKAGE_e2fsprogs=y          # mkfs.ext4 / resize2fs / e2fsck
          CONFIG_PACKAGE_dosfstools=y         # mkfs.vfat / mkfs.fat
          CONFIG_PACKAGE_blkid=y              # blkid（如果 lsblk 已带可省，但保险起见选上）

          # 关闭非必须（已精简，无需通配符）
          CONFIG_PACKAGE_docker=n
          CONFIG_PACKAGE_*proxy*=n
          CONFIG_PACKAGE_*vpn*=n

          EOF

          # busybox增加 NOHUP 支持
          # 这一行必须在 make defconfig 之前，且操作的是 busybox 的源配置
          # find package/utils/busybox/config -name Config.in | xargs sed -i 's/default n/default y/g' if grep -q "config NOHUP" $1 2>/dev/null
          # 或者更简单直接的操作：
          # sed -i 's/# CONFIG_NOHUP is not set/CONFIG_NOHUP=y/' package/utils/busybox/Config-defaults || true
          # sed -i 's/# CONFIG_NOHUP is not set/CONFIG_NOHUP=y/' package/utils/busybox/config/coreutils/Config.in


          make defconfig

      - name: 下载依赖
        run: |
          make download -j$(nproc) || make download -j1

      - name: 开始编译（稳定模式）
        run: |
          make -j$(nproc) V=s IGNORE_ERRORS="n m" || make -j1 V=s IGNORE_ERRORS="n m"

      - name: 列出生成的 bin 文件（调试用）
        if: always() # 即使编译失败也跑
        run: |
          ls -la bin/targets/qualcommax/ipq60xx/ || true
          find bin/targets/qualcommax/ipq60xx -type f -name "*.bin" || true

      - name: 上传固件
        uses: actions/upload-artifact@v6
        with:
          name: VIKINGYFY-RE-SS-01-极简固件
          path: bin/targets/qualcommax/ipq60xx/*jdcloud_re-ss-01-*.bin
