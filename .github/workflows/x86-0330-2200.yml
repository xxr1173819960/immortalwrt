name: Build x86_64 PVE 极简固件 0330

on:
  workflow_dispatch:
    inputs:
      git_tag: # 输入参数，名称自定义
        description: "要编译的 Git Tag 版本（例如 v1.2.3）"
        required: true
        default: "latest" # 默认值，可选

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout VIKINGYFY 源码
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: ${{ github.event.inputs.git_tag }}
          fetch-depth: 1

      - name: 复制自定义 files 并设置权限
        run: |
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-custom-defaults << 'EOF'
          #!/bin/sh

          # 1. 修改主机名
          uci set system.@system[0].hostname='Redmi-K60'

          # 2. 修改 LAN IP (单臂路由管理 IP)
          uci set network.lan.ipaddr='192.168.123.201'
          uci set network.lan.netmask='255.255.255.0'

          # 3. 设置 Root 密码为 12341234
          printf "12341234\n12341234\n" | passwd root

          # 4. 切换拥塞控制算法
          echo "net.core.default_qdisc=fq" >> /etc/sysctl.d/10-default.conf
          echo "net.ipv4.tcp_congestion_control=bbr" >> /etc/sysctl.d/10-default.conf
          sysctl -p /etc/sysctl.d/10-default.conf

          # 6. 保存所有 UCI 修改
          uci commit network
          uci commit system

          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-custom-defaults

      - name: 安装编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch python3 python2.7 unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler ccache ecj fastjar mkisofs wget curl swig rsync file python3-distutils python3-setuptools

      - name: 更新 feeds 并生成默认配置
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入 x86_64 及 PVE 专属配置
        run: |
          cat > .config << 'EOF'
          # === 1. x86_64 通用平台设定 ===
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          # === 2. 固件格式与引导 ===
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_GRUB_EFI_IMAGES=y
          CONFIG_GRUB_IMAGES=y
          CONFIG_TARGET_IMAGES_GZIP=y
          # 分配较大的根目录空间以免插件装不下 (单位MB)
          CONFIG_TARGET_KERNEL_PARTSIZE=32
          CONFIG_TARGET_ROOTFS_PARTSIZE=512

          # === 3. PVE 虚拟化与单臂路由专属优化 ===
          CONFIG_PACKAGE_kmod-virtio-net=y     # VirtIO 虚拟网卡驱动
          CONFIG_PACKAGE_kmod-virtio-blk=y     # VirtIO 虚拟磁盘驱动
          CONFIG_PACKAGE_kmod-virtio-scsi=y    # VirtIO SCSI 驱动
          CONFIG_PACKAGE_kmod-virtio-balloon=y # VirtIO 内存气球驱动
          CONFIG_PACKAGE_qemu-ga=y             # QEMU Guest Agent (PVE 必备，支持联动关机和显示 IP)
          CONFIG_PACKAGE_kmod-8021q=y          # VLAN 支持 (单臂路由必备)


          CONFIG_PACKAGE_kmod-ipt-offload=y
          CONFIG_PACKAGE_kmod-tcp-bbr=y


          # === 6. 系统工具与依赖 ===
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl-openssl=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-zerotier-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-openclash-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-passwall2-zh-cn=y

          CONFIG_PACKAGE_luci-theme-argon=n
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_procps-ng-ps=y
          CONFIG_PACKAGE_procps-ng-pidof=y
          CONFIG_PACKAGE_coreutils-date=y
          CONFIG_PACKAGE_coreutils-base64=y
          CONFIG_PACKAGE_grep=y
          CONFIG_PACKAGE_gawk=y
          CONFIG_PACKAGE_sed=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_unzip=y

          # SSH 和文件系统支持
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_openssh-server=n
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_dosfstools=y
          CONFIG_PACKAGE_blkid=y

          # 关闭非必须项
          CONFIG_PACKAGE_docker=n

          EOF

          make defconfig

      - name: 下载依赖
        run: |
          make download -j$(nproc) || make download -j1

      - name: 开始编译（稳定模式）
        run: |
          make -j$(nproc) V=s IGNORE_ERRORS="n m" || make -j1 V=s IGNORE_ERRORS="n m"

      - name: 列出生成的 bin 文件（调试用）
        if: always()
        run: |
          ls -la bin/targets/x86/64/ || true
          find bin/targets/x86/64 -type f -name "*.img.gz" || true

      - name: 上传固件
        uses: actions/upload-artifact@v6
        with:
          name: VIKINGYFY-x86_64-PVE单臂路由固件
          path: bin/targets/x86/64/*-ext4-combined-efi*
